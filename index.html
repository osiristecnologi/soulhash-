<!DOCTYPE html>

<style>

  --text:#d8d0c0;--text-d:#403860;

  --empatia:#32d46a;--equil:#38b8f0;
  --energy:#c026d3;--green:#22c55e;

<body>
<canvas id="bgc"></canvas>

</audio>

</audio>

<!-- ====================== RESTO DO HTML (igual ao original) ====================== -->
<!-- LOADING -->

  <div class="load-rune">🜁</div>

</div>

<!-- CONNECT, WELCOME, ARENA, RESULT OVERLAY, TOAST -->

<!-- Exemplo resumido da Arena com botão de música -->
<div class="screen" id="s-arena">
  <div style="width:100%;display:flex;flex-direction:column">
    <div class="topbar">
      <div class="tb-player"> <!-- conteúdo original --> </div>
      <div class="tb-center"> <!-- conteúdo original --> </div>
      <div class="tb-cur">
        <!-- pills originais -->
        <button id="music-toggle" style="background:none;border:none;color:var(--gold);font-size:20px;cursor:pointer;padding:5px 10px;" title="Música de Fundo">♪</button>
      </div>
    </div>

    <div class="arena-layout">
      <!-- todo o conteúdo da arena (left, center, right) permanece igual -->
      <!-- ... seu código original da arena ... -->
    </div>
  </div>
</div>

<!-- result-ovl e toast (mesmo do original) -->

<script>
// ====================== CONFIG + ÁUDIO ======================
const API = 'https://soulhash-api.onrender.com';

const bgMusic = document.getElementById('bg-music');
const sfxSpin = document.getElementById('sfx-spin');
const sfxWin  = document.getElementById('sfx-win');
const sfxLose = document.getElementById('sfx-lose');
const sfxClick = document.getElementById('sfx-click');

let musicEnabled = true;

function playSFX(audioElement) {
  if (!audioElement) return;
  audioElement.currentTime = 0;
  audioElement.play().catch(() => {});
}

function toggleMusic() {
  musicEnabled = !musicEnabled;
  const btn = document.getElementById('music-toggle');
  if (musicEnabled) {
    btn.textContent = '♪';
    bgMusic.play().catch(() => {});
  } else {
    btn.textContent = '♫';
    bgMusic.pause();
  }
}

function startBackgroundMusic() {
  if (!musicEnabled) return;
  bgMusic.volume = 0.35; // volume confortável para música de fundo
  bgMusic.play().catch(() => console.log("Autoplay bloqueado pelo navegador"));
}

// ====================== STATE (seu código original) ======================
const S = {
  wallet:       null,
  sessionToken: null,
  soul:         null,
  soulhash:     null,
  spinning:     false,
};

// ====================== CANVAS BG (seu código original) ======================
// ... (mantenha o código do canvas de estrelas)

// ====================== SCREENS, STEPS, STATUS, TOAST, UTILS (seu código original) ======================
// ... cole todas as funções que você já tinha: showScreen, setStep, setStatus, toast, etc.

// ====================== FUNÇÃO enterArena ATUALIZADA ======================
function enterArena(){
  const soul = S.soul;
  const hash = soul?.soulhash || S.soulhash || '—';
  setText('tb-hash', hash);
  setText('tb-lvl',  soul?.level || 1);
  setText('hash-val', soul?.hash_balance ?? 100);
  setText('gem-val',  soul?.gems ?? 0);
  buildGrid();
  buildPips(soul?.energy??7, soul?.maxEnergy??10);
  buildYourCards(soul?.ownedCards??{});
  updateDim(soul?.dimProgress??0);
  showScreen('s-arena');
  
  startBackgroundMusic();   // ← Inicia a música ao entrar na arena
}

// ====================== FUNÇÃO doSpin ATUALIZADA ======================
async function doSpin(){
  if(S.spinning) return;
  if(!S.sessionToken){ toast('Sessão expirada.'); return; }

  const soul = S.soul;
  if(!soul || soul.energy <= 0){ toast('Sem energia!'); return; }

  S.spinning = true;
  document.getElementById('btn-spin').disabled = true;
  playSFX(sfxSpin);                    // ← Som de giro

  try {
    const res = await fetch(`${API}/spin`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'x-session-token': S.sessionToken}
    });

    if(res.status === 401){ 
      S.sessionToken = null; 
      toast('Sessão expirada.');
      showScreen('s-connect'); 
      return; 
    }
    if(!res.ok) throw new Error('Falha no spin');

    const data = await res.json();
    const result = data.result;

    Object.assign(S.soul, {
      hash_balance: data.hash_balance,
      energy:       data.energy,
      maxEnergy:    data.maxEnergy,
      level:        data.level,
      dimProgress:  data.dimProgress,
      ownedCards:   data.ownedCards,
    });

    await animateSpin(result.grid);
    renderGrid(result.grid);
    await sleep(300);

    if(result.isWin){
      playSFX(sfxWin);
      // destaque das cartas vencedoras...
    } else {
      playSFX(sfxLose);
    }

    updateLastGrid(result.grid);
    updateHUD();
    await sleep(500);
    showResult(result, data);

  } catch(e){
    toast('Erro: ' + sanitize(e.message));
    playSFX(sfxLose);
  } finally {
    S.spinning = false;
    document.getElementById('btn-spin').disabled = false;
    updateHUD();
  }
}

// ====================== EVENT LISTENERS ======================
document.getElementById('music-toggle').addEventListener('click', toggleMusic);

// Clique geral para som sutil
document.addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
    playSFX(sfxClick);
  }
}, true);

// ====================== INIT ======================
window.addEventListener('load', async () => {
  setTimeout(() => {
    document.getElementById('s-load').classList.remove('active');
    showScreen('s-connect');
    // ... seu código de reconexão da Phantom ...
  }, 2200);
});

// Mantenha todas as outras funções e listeners que você já tinha (connectWallet, signAuth, etc.)

</script>
</body>
</html>
