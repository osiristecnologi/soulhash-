<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>SoulHash</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/bs58@latest/browser.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b2e 50%, #0a0a0a 100%);
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
            border-bottom: 2px solid #ffd700;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .balance-display {
            background: linear-gradient(135deg, #2d2d44, #1a1a2e);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid #ffd700;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .balance-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(45deg, #9333ea, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .menu-btn {
            background: linear-gradient(135deg, #4a4a6a, #2d2d44);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px 15px; }
        .connect-section { text-align: center; padding: 60px 20px; }
        .connect-section h1 {
            font-size: 32px;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .connect-section p { margin-bottom: 30px; color: #888; font-size: 16px; }
        .connect-btn {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
            border: none;
            color: white;
            padding: 18px 40px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
        }
        .connect-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .game-board { display: none; }
        .game-board.active { display: block; }
        .energy-container {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #9333ea;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .energy-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .energy-bar { height: 25px; background: rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; }
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #9333ea, #7c3aed, #a855f7);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        .result-message {
            text-align: center;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .result-message.show { display: block; animation: slideIn 0.3s ease; }
        .result-message.win { background: rgba(34, 197, 94, 0.2); border: 2px solid #22c55e; color: #4ade80; }
        .result-message.lose { background: rgba(239, 68, 68, 0.2); border: 2px solid #ef4444; color: #f87171; }
        .result-message.crystal-win { background: rgba(168, 85, 247, 0.3); border: 2px solid #a855f7; color: #c084fc; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .slot-container {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #2d2d44, #1a1a2e);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .card.spinning { animation: shake 0.1s ease-in-out infinite; filter: brightness(1.3); }
        @keyframes shake {
            0%, 100% { transform: translateY(-2px) rotate(-0.5deg); }
            50% { transform: translateY(2px) rotate(0.5deg); }
        }
        .card.winning { animation: winPulse 0.8s ease infinite; border-color: #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        @keyframes winPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .card.crystal { border-color: #a855f7; animation: crystalPulse 1s ease infinite; }
        @keyframes crystalPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.6); }
            50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.9); }
        }
        .card-icon { font-size: 36px; margin-bottom: 5px; }
        .card-label { font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .card[data-type="light"] { border-color: #ffd700; }
        .card[data-type="shadow"] { border-color: #9333ea; }
        .card[data-type="chaos"] { border-color: #ef4444; }
        .card[data-type="empathy"] { border-color: #22c55e; }
        .card[data-type="balance"] { border-color: #3b82f6; }
        .card[data-type="crystal"] { border-color: #a855f7; }
        .spin-container { text-align: center; }
        .spin-btn {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
            border: 3px solid #ffd700;
            color: white;
            padding: 18px 60px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #4a4a6a; }
        .spin-cost { margin-top: 8px; color: #9333ea; font-size: 13px; }
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 11px; color: #888; margin-top: 3px; }
    </style>
</head>
<body>

<script>
async function connectWallet() {
    try {
        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();

        const challengeRes = await fetch(`${API_URL}/challenge`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wallet }),
        });

        const challengeData = await challengeRes.json();

        const encodedMessage = new TextEncoder().encode(challengeData.message);

        // 🔧 CORREÇÃO AQUI (REMOVIDO 'utf8')
        const signedMessage = await window.solana.signMessage(encodedMessage);

        const verifyRes = await fetch(`${API_URL}/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                wallet,
                signature: bs58.encode(signedMessage.signature)
            }),
        });

        const verifyData = await verifyRes.json();

        console.log("Conectado com sucesso:", verifyData);

    } catch (error) {
        console.error("Erro assinatura:", error);
    }
}
</script>

</body>
</html>
