<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>SoulHash</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://unpkg.com/bs58@latest/browser.js"></script>

<style>
/* ===== SEU CSS MANTIDO (sem alteração visual) ===== */
/* 👉 (não cortei pra não perder seu design) */
body {
    margin:0;
    font-family: sans-serif;
    background: #0a0a0a;
    color:white;
}
button { cursor:pointer; }
.hidden { display:none; }
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
    <div>⚡ SOULHASH</div>
    <div id="balance">0</div>
</div>

<!-- ================= CONNECT ================= -->
<div id="connectScreen">
    <h1>SoulHash</h1>
    <button onclick="connect()">Conectar Wallet</button>
</div>

<!-- ================= GAME ================= -->
<div id="gameScreen" class="hidden">

    <div>
        Energia: <span id="energy">0</span>
    </div>

    <div id="grid"></div>

    <button onclick="spin()">GIRAR</button>

</div>

<script>
/* =====================================================
   🔥 SOULHASH FRONTEND CLEAN ARCHITECTURE
===================================================== */

const API = "https://soulhash-api.onrender.com";

/* ================= STATE ================= */
const state = {
    wallet: null,
    token: null,
    balance: 0,
    energy: 0,
    stats: {}
};

/* ================= API WRAPPER ================= */
async function api(path, body = {}) {
    const res = await fetch(API + path, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-session-token": state.token || ""
        },
        body: JSON.stringify(body)
    });

    return res.json();
}

/* ================= CONNECT WALLET ================= */
async function connect() {
    try {
        if (!window.solana) return alert("Instale Phantom");

        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();

        const challenge = await api("/challenge", { wallet });

        const msg = new TextEncoder().encode(challenge.message);
        const sig = await window.solana.signMessage(msg);

        const verify = await api("/verify", {
            wallet,
            signature: bs58.encode(sig.signature)
        });

        state.wallet = wallet;
        state.token = verify.sessionToken;
        state.balance = verify.balance;
        state.energy = verify.energy;
        state.stats = verify.stats;

        updateUI();

        document.getElementById("connectScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");

    } catch (err) {
        console.error(err);
        alert("Erro ao conectar");
    }
}

/* ================= SPIN ================= */
async function spin() {
    try {
        const res = await api("/spin");

        state.balance = res.balance;
        state.energy = res.energy;
        state.stats = res.stats;

        renderGrid(res.grid);

        updateUI();

    } catch (err) {
        console.error(err);
        alert("Erro no spin");
    }
}

/* ================= RENDER GRID ================= */
function renderGrid(grid) {
    const el = document.getElementById("grid");
    el.innerHTML = "";

    grid.forEach(card => {
        const div = document.createElement("div");
        div.textContent = card;
        div.style.padding = "10px";
        div.style.border = "1px solid #444";
        div.style.display = "inline-block";
        div.style.margin = "5px";
        el.appendChild(div);
    });
}

/* ================= UI ================= */
function updateUI() {
    document.getElementById("balance").textContent = state.balance;
    document.getElementById("energy").textContent = state.energy;
}

</script>

</body>
</html>
