<!DOCTYPE html>
<html>
<head>
  <title>SoulHash Payment</title>
  <script src="https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;padding:20px;">

<h1>⚡ SoulHash</h1>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="wallet"></p>
<p id="soulhash" style="color:gold;"></p>
<p id="status"></p>

<br>

<h2>💸 Pagamentos (Evolução da Alma)</h2>

<button onclick="pay(0.06)">Taxa 1 — 0.06 SOL</button>
<br><br>
<button onclick="pay(0.15)">Taxa 2 — 0.15 SOL</button>
<br><br>
<button onclick="pay(0.50)">Taxa 3 — 0.50 SOL (Premium)</button>

<script>
let userWallet = null;

const RECIPIENT = new solanaWeb3.PublicKey(
  "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm"
);

const connection = new solanaWeb3.Connection(
  "https://api.mainnet-beta.solana.com",
  "confirmed"
);

function generateSoulHash(wallet) {
  let hash = 0;
  for (let i = 0; i < wallet.length; i++) {
    hash = (hash * 31 + wallet.charCodeAt(i)) % 1000000007;
  }
  return "SOUL-" + hash;
}

async function connectWallet() {
  if (!window.solana || !window.solana.isPhantom) {
    alert("Abra no Phantom");
    return;
  }

  const resp = await window.solana.connect();
  userWallet = resp.publicKey.toString();

  document.getElementById("wallet").innerText =
    "Wallet: " + userWallet;

  document.getElementById("soulhash").innerText =
    "SoulHash: " + generateSoulHash(userWallet);
}

async function pay(amount) {
  if (!userWallet) return alert("Conecte a wallet");

  try {
    const fromPubkey = new solanaWeb3.PublicKey(userWallet);

    const tx = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey,
        toPubkey: RECIPIENT,
        lamports: amount * solanaWeb3.LAMPORTS_PER_SOL
      })
    );

    const { blockhash } = await connection.getLatestBlockhash();
    tx.recentBlockhash = blockhash;
    tx.feePayer = fromPubkey;

    const signed = await window.solana.signTransaction(tx);

    const signature = await connection.sendRawTransaction(
      signed.serialize()
    );

    await connection.confirmTransaction(signature, "confirmed");

    document.getElementById("status").innerText =
      "✅ Pago: " + amount + " SOL\nTX: " + signature;

    // evolução simples da alma
    document.getElementById("soulhash").innerText =
      "SoulHash Evoluído: " + generateSoulHash(userWallet + amount);

  } catch (err) {
    console.error(err);
    alert("Erro: " + err.message);
  }
}
</script>

</body>
</html>
