<!DOCTYPE html>
<html>
<head>
  <title>Pagamento SOL Simples</title>
  <script src="https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h2>Pagamento Simples SOL</h2>

<button onclick="connectWallet()">Conectar Wallet</button>
<br><br>

<input id="amount" type="number" placeholder="Valor em SOL" />
<br><br>

<button onclick="sendPayment()">Pagar</button>

<p id="status"></p>

<script>
let userWallet = null;

const RECIPIENT = new solanaWeb3.PublicKey(
  "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm"
);

const connection = new solanaWeb3.Connection(
  "https://api.mainnet-beta.solana.com",
  "confirmed"
);

// Conectar Phantom
async function connectWallet() {
  if (!window.solana || !window.solana.isPhantom) {
    alert("Abra no Phantom Wallet");
    return;
  }

  const resp = await window.solana.connect();
  userWallet = resp.publicKey.toString();

  document.getElementById("status").innerText =
    "Conectado: " + userWallet;
}

// Enviar pagamento
async function sendPayment() {
  if (!userWallet) return alert("Conecte a wallet primeiro");

  const amount = parseFloat(document.getElementById("amount").value);
  if (!amount || amount <= 0) return alert("Valor inválido");

  try {
    const fromPubkey = new solanaWeb3.PublicKey(userWallet);

    const transaction = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey,
        toPubkey: RECIPIENT,
        lamports: amount * solanaWeb3.LAMPORTS_PER_SOL
      })
    );

    // blockhash obrigatório
    const { blockhash } = await connection.getLatestBlockhash();
    transaction.recentBlockhash = blockhash;
    transaction.feePayer = fromPubkey;

    // assinar
    const signed = await window.solana.signTransaction(transaction);

    // enviar
    const signature = await connection.sendRawTransaction(
      signed.serialize()
    );

    await connection.confirmTransaction(signature, "confirmed");

    document.getElementById("status").innerText =
      "Pagamento enviado! TX: " + signature;

  } catch (err) {
    console.error(err);
    alert("Erro no pagamento: " + err.message);
  }
}
</script>

</body>
</html>
