<!DOCTYPE html>
<html>
<head>
  <title>SoulHash</title>
  <!-- Versão mais recente recomendada do solana/web3.js -->
  <script src="https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif; padding:20px; line-height:1.5;">

<h1>SoulHash</h1>

<button onclick="connectWallet()" style="padding:12px 28px; font-size:16px; margin:10px;">Connect Wallet</button>

<p id="wallet" style="margin:15px 0; word-break:break-all; color:#ccc;"></p>
<p id="soulhash" style="margin:15px 0; color:#ffd700; font-weight:bold;"></p>

<h2>Phase 1: The Awakening</h2>

<button onclick="choose('light')" style="margin:5px; padding:10px 20px;">Follow the Light</button>
<button onclick="choose('shadow')" style="margin:5px; padding:10px 20px;">Embrace Darkness</button>
<button onclick="choose('balance')" style="margin:5px; padding:10px 20px;">Stay Neutral</button>

<br><br><br>

<!-- Seção de Pagamento -->
<h2>Pague para Evoluir sua Alma</h2>
<p style="color:#aaa; max-width:500px; margin:10px auto 25px;">
  Escolha uma taxa para fortalecer sua jornada espiritual
</p>

<div style="margin:0 auto; display:flex; flex-direction:column; gap:14px; max-width:420px;">
  <button onclick="payTax(0.06)" id="btn1" 
    style="padding:16px; background:#1a1a2e; border:2px solid #ffd700; color:#ffd700; border-radius:10px; font-size:17px; cursor:pointer;">
    Taxa 1 — <strong>0.06 SOL</strong>
  </button>
  
  <button onclick="payTax(0.15)" id="btn2" 
    style="padding:16px; background:#1a1a2e; border:2px solid #ffd700; color:#ffd700; border-radius:10px; font-size:17px; cursor:pointer;">
    Taxa 2 — <strong>0.15 SOL</strong>
  </button>
  
  <button onclick="payTax(0.50)" id="btn3" 
    style="padding:16px; background:#1a1a2e; border:2px solid #ffd700; color:#ffd700; border-radius:10px; font-size:17px; cursor:pointer;">
    Taxa 3 — <strong>0.50 SOL</strong> <span style="color:#ffaa00;">(Premium)</span>
  </button>
</div>

<br><br>

<a href="https://phantom.app/ul/browse/https://osiristecnologi.github.io" style="color:cyan; text-decoration:underline;">
  Abrir direto na Phantom Wallet
</a>

<script>
let userWallet = "";

// ✅ Sua wallet já inserida
const RECIPIENT_WALLET = "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm";

// 🔥 CONECTAR WALLET
async function connectWallet() {
  try {
    if (!window.solana || !window.solana.isPhantom) {
      alert("Por favor, abra este site dentro da Phantom Wallet");
      return;
    }

    const resp = await window.solana.connect();
    userWallet = resp.publicKey.toString();

    document.getElementById("wallet").innerHTML = `<strong>Wallet conectada:</strong><br>${userWallet}`;

    const response = await fetch("https://soulhash-api.onrender.com/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ wallet: userWallet })
    });

    const data = await response.json();
    document.getElementById("soulhash").innerText = "SoulHash: " + (data.soulhash || "Recebido com sucesso");

  } catch (err) {
    console.error(err);
    alert("Falha ao conectar a wallet. Tente novamente.");
  }
}

// 🎮 ESCOLHAS
async function choose(type) {
  if (!userWallet) {
    alert("Conecte sua wallet primeiro!");
    return;
  }

  try {
    const response = await fetch("https://soulhash-api.onrender.com/choice", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ wallet: userWallet, choice: type })
    });

    const data = await response.json();
    alert(`Atualizado:\nLight: ${data.luz || 0}\nShadow: ${data.sombra || 0}\nBalance: ${data.equilibrio || 0}`);
  } catch (e) {
    alert("Erro ao registrar escolha. Verifique sua conexão.");
  }
}

// 💰 PAGAMENTO DE TAXA
async function payTax(amountSOL) {
  if (!userWallet) {
    alert("Conecte sua wallet primeiro!");
    return;
  }

  const confirmPay = confirm(`Confirmar o pagamento de ${amountSOL} SOL?\n\nEsta taxa será enviada para fortalecer sua alma no SoulHash.`);
  if (!confirmPay) return;

  // Loading nos botões
  const btnId = amountSOL === 0.06 ? "btn1" : amountSOL === 0.15 ? "btn2" : "btn3";
  const btn = document.getElementById(btnId);
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.style.opacity = "0.6";
  btn.innerHTML = "Enviando transação...";

  try {
    const connection = new solanaWeb3.Connection(
      "https://api.mainnet-beta.solana.com", 
      "confirmed"
    );

    const fromPubkey = new solanaWeb3.PublicKey(userWallet);
    const toPubkey = new solanaWeb3.PublicKey(RECIPIENT_WALLET);

    const lamports = Math.round(amountSOL * solanaWeb3.LAMPORTS_PER_SOL);

    const transaction = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: fromPubkey,
        toPubkey: toPubkey,
        lamports: lamports,
      })
    );

    const { signature } = await window.solana.signAndSendTransaction(transaction);

    await connection.confirmTransaction(signature, "confirmed");

    alert(`✅ Pagamento de ${amountSOL} SOL realizado com sucesso!\n\nTransação: ${signature.substring(0, 20)}...`);

    // Envia para o backend
    await fetch("https://soulhash-api.onrender.com/pay", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ 
        wallet: userWallet, 
        amount: amountSOL,
        signature: signature 
      })
    });

  } catch (err) {
    console.error(err);
    alert("Pagamento falhou ou foi cancelado:\n" + err.message);
  } finally {
    // Restaura o botão
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.innerHTML = originalText;
  }
}
</script>

</body>
</html>
