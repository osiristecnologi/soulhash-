<!DOCTYPE html>
<html>
<head>
  <title>SoulHash</title>
  <script src="https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif; padding:20px; line-height:1.6;">

<h1>SoulHash</h1>

<button onclick="connectWallet()" style="padding:12px 28px; font-size:16px; margin:10px;">Connect Wallet</button>

<p id="wallet" style="margin:10px 0; word-break:break-all; color:#ccc; font-size:14px;"></p>
<p id="balance" style="margin:5px 0; color:#00ff9d; font-weight:bold; font-size:18px;"></p>
<p id="soulhash" style="margin:10px 0; color:#ffd700; font-weight:bold;"></p>

<h2>Phase 1: The Awakening</h2>
<button onclick="choose('light')" style="margin:5px; padding:10px 20px;">Follow the Light</button>
<button onclick="choose('shadow')" style="margin:5px; padding:10px 20px;">Embrace Darkness</button>
<button onclick="choose('balance')" style="margin:5px; padding:10px 20px;">Stay Neutral</button>

<br><br><br>

<h2>Pague para Evoluir sua Alma</h2>
<p style="color:#aaa; max-width:500px; margin:10px auto 20px;">
  Escolha uma taxa para fortalecer sua jornada
</p>

<div style="margin:0 auto; display:flex; flex-direction:column; gap:14px; max-width:420px;">
  <button onclick="payTax(0.06)" id="btn1" style="padding:16px; background:#1a1a2e; border:2px solid #ffd700; color:#ffd700; border-radius:10px; font-size:17px; cursor:pointer;">
    Taxa 1 — <strong>0.06 SOL</strong>
  </button>
  
  <button onclick="payTax(0.15)" id="btn2" style="padding:16px; background:#1a1a2e; border:2px solid #ffd700; color:#ffd700; border-radius:10px; font-size:17px; cursor:pointer;">
    Taxa 2 — <strong>0.15 SOL</strong>
  </button>
  
  <button onclick="payTax(0.50)" id="btn3" style="padding:16px; background:#1a1a2e; border:2px solid #ffd700; color:#ffd700; border-radius:10px; font-size:17px; cursor:pointer;">
    Taxa 3 — <strong>0.50 SOL</strong> <span style="color:#ffaa00;">(Premium)</span>
  </button>
</div>

<br><br>

<!-- Botão para abrir Swap no Phantom -->
<button onclick="openPhantomSwap()" style="padding:12px 24px; background:#9945ff; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; margin:10px;">
  🌀 Abrir Swap no Phantom
</button>

<br>
<a href="https://phantom.app/ul/browse/https://osiristecnologi.github.io" style="color:cyan; text-decoration:underline;">
  Abrir site direto na Phantom
</a>

<script>
let userWallet = "";
const RECIPIENT_WALLET = "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm";
let connection = null;

// Conectar Wallet + mostrar saldo
async function connectWallet() {
  try {
    if (!window.solana || !window.solana.isPhantom) {
      alert("Abra este site dentro da Phantom Wallet");
      return;
    }

    const resp = await window.solana.connect();
    userWallet = resp.publicKey.toString();

    document.getElementById("wallet").innerHTML = `<strong>Wallet:</strong><br>${userWallet}`;

    // Configura conexão
    connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

    // Busca e mostra saldo
    await updateBalance();

    // Login no backend
    const response = await fetch("https://soulhash-api.onrender.com/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ wallet: userWallet })
    });

    const data = await response.json();
    document.getElementById("soulhash").innerText = "SoulHash: " + (data.soulhash || "Recebido");

  } catch (err) {
    console.error(err);
    alert("Falha ao conectar. Tente novamente.");
  }
}

// Atualiza saldo da wallet
async function updateBalance() {
  if (!connection || !userWallet) return;
  try {
    const pubkey = new solanaWeb3.PublicKey(userWallet);
    const balanceLamports = await connection.getBalance(pubkey);
    const balanceSOL = (balanceLamports / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4);
    document.getElementById("balance").innerText = `Saldo: ${balanceSOL} SOL`;
  } catch (e) {
    document.getElementById("balance").innerText = "Saldo: Erro ao carregar";
  }
}

// Escolhas (mantido)
async function choose(type) {
  if (!userWallet) {
    alert("Conecte sua wallet primeiro!");
    return;
  }
  try {
    const response = await fetch("https://soulhash-api.onrender.com/choice", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ wallet: userWallet, choice: type })
    });
    const data = await response.json();
    alert(`Atualizado:\nLight: ${data.luz || 0}\nShadow: ${data.sombra || 0}\nBalance: ${data.equilibrio || 0}`);
  } catch (e) {
    alert("Erro ao registrar escolha.");
  }
}

// Pagamento de Taxa
async function payTax(amountSOL) {
  if (!userWallet) {
    alert("Conecte sua wallet primeiro!");
    return;
  }
  if (!connection) {
    alert("Conexão não inicializada. Conecte novamente.");
    return;
  }

  const confirmPay = confirm(`Confirmar pagamento de ${amountSOL} SOL?`);
  if (!confirmPay) return;

  const btnId = `btn${amountSOL === 0.06 ? 1 : amountSOL === 0.15 ? 2 : 3}`;
  const btn = document.getElementById(btnId);
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "Enviando...";

  try {
    const fromPubkey = new solanaWeb3.PublicKey(userWallet);
    const toPubkey = new solanaWeb3.PublicKey(RECIPIENT_WALLET);

    const transaction = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: fromPubkey,
        toPubkey: toPubkey,
        lamports: Math.round(amountSOL * solanaWeb3.LAMPORTS_PER_SOL),
      })
    );

    const { signature } = await window.solana.signAndSendTransaction(transaction);
    await connection.confirmTransaction(signature, "confirmed");

    alert(`✅ Pagamento de ${amountSOL} SOL enviado com sucesso!\n\nTx: ${signature.slice(0, 20)}...`);

    // Atualiza saldo após pagamento
    await updateBalance();

    // Envia para backend
    await fetch("https://soulhash-api.onrender.com/pay", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ wallet: userWallet, amount: amountSOL, signature })
    });

  } catch (err) {
    console.error(err);
    alert("Transação cancelada ou falhou: " + (err.message || err));
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

// Abrir Swap diretamente no Phantom
function openPhantomSwap() {
  if (!userWallet) {
    alert("Conecte sua wallet primeiro!");
    return;
  }
  // Deeplink para swap (compra SOL por padrão)
  window.location.href = `https://phantom.app/ul/v1/swap?buy=solana:So11111111111111111111111111111111111111112`;
}
</script>

</body>
</html>
