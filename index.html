<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SoulHash AAA</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0b1020, #05060a);
  color: white;
  font-family: Arial;
  overflow: hidden;
}

.container {
  width: 420px;
  margin: auto;
  margin-top: 40px;
  background: rgba(17,24,39,0.9);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 0 40px rgba(0,255,180,0.1);
}

h2 {
  text-align: center;
  color: #22c55e;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: linear-gradient(90deg,#22c55e,#06b6d4);
  cursor: pointer;
  font-weight: bold;
}

#machine {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
}

.cell {
  height: 80px;
  background: #0f172a;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  transition: 0.2s;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

.spin {
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}

.win {
  box-shadow: 0 0 20px #22c55e;
}

.lose {
  box-shadow: 0 0 20px #ef4444;
}

#info {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.9;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #22c55e;
  border-radius: 50%;
  animation: float 1s linear forwards;
}

@keyframes float {
  to {
    transform: translateY(-120px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ SoulHash AAA</h2>

<input id="wallet" placeholder="wallet"/>
<button onclick="challenge()">Challenge</button>
<button onclick="verify()">Verify</button>

<div id="machine"></div>

<button onclick="spin()">SPIN</button>

<div id="info"></div>

</div>

<script>
const API = "http://localhost:3000";

let wallet = "";
let token = "";

const icons = ["🔥","💧","🌍","🌪️","✨"];

function renderGrid(grid, spinning=false, winPos=[]) {
  const m = document.getElementById("machine");
  m.innerHTML = "";

  grid.forEach((g,i)=>{
    const d = document.createElement("div");
    d.className = "cell";

    if (spinning) d.classList.add("spin");

    if (winPos.includes(i)) d.classList.add("win");

    d.innerText = iconsMap(g);
    m.appendChild(d);
  });
}

function iconsMap(c){
  if (c==="fire") return "🔥";
  if (c==="water") return "💧";
  if (c==="earth") return "🌍";
  if (c==="air") return "🌪️";
  return "✨";
}

function particles(x=200,y=200){
  for(let i=0;i<20;i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = x + Math.random()*80 + "px";
    p.style.top  = y + "px";
    document.body.appendChild(p);

    setTimeout(()=>p.remove(),1000);
  }
}

async function challenge(){
  wallet = document.getElementById("wallet").value;

  const r = await fetch(API+"/challenge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({wallet})
  });

  const d = await r.json();
  alert("Challenge ok");
}

async function verify(){
  const r = await fetch(API+"/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      wallet,
      signature:"fake"
    })
  });

  const d = await r.json();
  token = d.sessionToken;

  document.getElementById("info").innerText =
    `⚡ Energy: ${d.energy} | 💰 Balance: ${d.balance}`;

  renderGrid(["fire","water","earth","air","fire"]);
}

async function spin(){
  renderGrid(Array(9).fill("fire"), true);

  const r = await fetch(API+"/spin",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-session-token":token
    }
  });

  const d = await r.json();

  setTimeout(()=>{
    renderGrid(d.grid,false,d.winPositions || []);

    document.getElementById("info").innerText =
      `⚡ Energy: ${d.energy} | 💰 +${d.reward}`;

    if(d.isWin){
      particles(200,300);
    }

  }, 800);
}
</script>

</body>
</html>
