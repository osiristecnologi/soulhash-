<!DOCTYPE html>
<html>
<head>
  <title>SoulHash</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h1>SoulHash</h1>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="wallet"></p>
<p id="soulhash"></p>

<h2>Create Your Soul</h2>

<button onclick="pay('basic')">Basic Soul (0.02 SOL)</button><br><br>
<button onclick="pay('pro')">Pro Soul (0.06 SOL)</button><br><br>
<button onclick="pay('elite')">Elite Soul (0.1 SOL)</button>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>
let userWallet = "";

// SUA WALLET
const RECEIVER = "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm";

// PREÇOS
const prices = {
  basic: 0.02,
  pro: 0.06,
  elite: 0.1
};

// 🔑 CONECTAR + GERAR HASH
async function connectWallet() {
  try {
    if (!window.solana || !window.solana.isPhantom) {
      alert("Open inside Phantom Wallet");
      return;
    }

    const res = await window.solana.connect();
    userWallet = res.publicKey.toString();

    document.getElementById("wallet").innerText = "Wallet: " + userWallet;

    // 🔥 GERAR HASH
    const response = await fetch("https://soulhash-api.onrender.com/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wallet: userWallet })
    });

    const data = await response.json();

    document.getElementById("soulhash").innerText =
      "SoulHash: " + data.soulhash;

  } catch (err) {
    console.error(err);
    alert("Connection failed");
  }
}

// 💸 PAGAMENTO REAL (FUNCIONANDO NO MOBILE)
async function pay(type) {
  try {
    if (!userWallet) {
      alert("Connect wallet first");
      return;
    }

    const amount = prices[type];

    const connection = new solanaWeb3.Connection(
      solanaWeb3.clusterApiUrl("mainnet-beta"),
      "confirmed"
    );

    const transaction = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: new solanaWeb3.PublicKey(userWallet),
        toPubkey: new solanaWeb3.PublicKey(RECEIVER),
        lamports: amount * solanaWeb3.LAMPORTS_PER_SOL
      })
    );

    transaction.feePayer = new solanaWeb3.PublicKey(userWallet);

    const { blockhash } = await connection.getLatestBlockhash();
    transaction.recentBlockhash = blockhash;

    // 🔥 CORRETO PRA PHANTOM MOBILE
    const result = await window.solana.signAndSendTransaction(transaction);

    await connection.confirmTransaction(result.signature);

    alert("✅ Payment success!\nTX: " + result.signature);

    // 🔥 OPCIONAL: avisar backend depois do pagamento
    await fetch("https://soulhash-api.onrender.com/payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        wallet: userWallet,
        tier: type,
        tx: result.signature
      })
    });

  } catch (err) {
    console.error(err);
    alert("Payment failed: " + err.message);
  }
}
</script>

</body>
</html>
