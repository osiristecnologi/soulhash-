<script>

const API = 'https://soulhash-api.onrender.com';

async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    if (!res.ok && res.status !== 401) throw new Error(`HTTP ${res.status}`);
    return res;
  } catch (e) {
    console.warn('Backend offline → entrando em modo demo', e);
    S.isDemo = true;
    return null;
  }
}

async function previewHash(wallet, short) {
  setStatus('Calculando seu SoulHash...', 'info');
  const res = await safeFetch(`\( {API}/preview-hash?wallet= \){encodeURIComponent(wallet)}`);
  
  if (res && !S.isDemo) {
    const data = await res.json();
    S.soulhash = data.soulhash;
  } else {
    // Modo Demo
    S.soulhash = "SOUL-" + Math.random().toString(36).substring(2,10).toUpperCase();
  }

  const preview = document.getElementById('hash-preview');
  setText('hp-hash-val', S.soulhash);
  setText('hp-wallet-val', short + ' · Pré-visualização');
  preview.style.display = 'block';

  setStep(3);
  setStatus(S.isDemo ? 'Modo Demo: SoulHash gerado localmente!' : 'SoulHash gerado! Agora assine.', 'success');
  document.getElementById('btn-sign').style.display = 'block';
}

async function signAuth() {
  const btn = document.getElementById('btn-sign');
  btn.disabled = true;

  if (S.isDemo) {
    setStatus('Assinatura simulada (demo)', 'success');
    setStep(4);
    setTimeout(showWelcome, 600);
    return;
  }

  // fluxo original com nonce + login (mantido)
  try {

    console.error(e);
    S.isDemo = true;
    setStatus('Backend indisponível → Modo Demo ativado', 'warn');
    setTimeout(showWelcome, 800);
  }
}

function showWelcome() {
  const short = S.wallet ? S.wallet.slice(0,6)+'...'+S.wallet.slice(-4) : 'DemoWallet...';
  setText('bhd-hash', S.soulhash);
  setText('bhd-wallet', short + ' · Autenticado ✓');
  showScreen('s-welcome');
  toast('✦ SoulHash confirmado! +100 Hash creditados.');
}

// Arena e Spin (já funcionam melhor com demo)
async function doSpin() {
  if (S.spinning) return;
  S.spinning = true;
  document.getElementById('btn-spin').disabled = true;

  // Simulação simples quando em demo ou backend falhar
  if (S.isDemo || !S.sessionToken) {
    await animateSpin(); // sua função original
    const isWin = Math.random() > 0.65;
    const reward = isWin ? 50 : 0;
    if (S.soul) S.soul.hash_balance = (S.soul.hash_balance || 100) + reward;
    showResult({isWin, reward, combo: isWin ? '3linha' : 'none'}, {});
  } else {
    // fluxo original com fetch /spin
  }

  S.spinning = false;
  document.getElementById('btn-spin').disabled = false;
}
