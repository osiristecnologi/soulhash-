<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulHash Arena - Slot 3x3</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/bs58@latest/browser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b2e 50%, #0a0a0a 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
            border-bottom: 2px solid #ffd700;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .balance-display {
            background: linear-gradient(135deg, #2d2d44, #1a1a2e);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg, #9333ea, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .menu-btn {
            background: linear-gradient(135deg, #4a4a6a, #2d2d44);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* Menu Dropdown */
        .menu-dropdown {
            position: fixed;
            top: 70px;
            right: 30px;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 20px;
            min-width: 300px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .menu-dropdown.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-item {
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover {
            background: rgba(255,215,0,0.1);
            transform: translateX(5px);
        }

        .hash-info {
            font-family: monospace;
            background: rgba(147, 51, 234, 0.2);
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            margin: 10px 0;
        }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Connect Wallet Section */
        .connect-section {
            text-align: center;
            padding: 100px 20px;
        }

        .connect-btn {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
            border: none;
            color: white;
            padding: 20px 60px;
            font-size: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.4);
        }

        .connect-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(147, 51, 234, 0.6);
        }

        /* Game Board */
        .game-board {
            display: none;
        }

        .game-board.active {
            display: block;
        }

        /* Energy Bar */
        .energy-container {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #9333ea;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .energy-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .energy-bar {
            height: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #9333ea, #7c3aed, #a855f7);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }

        /* Slot Grid */
        .slot-container {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #2d2d44, #1a1a2e);
            border: 3px solid #4a4a6a;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            min-height: 150px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before {
            opacity: 1;
        }

        /* ANIMAÇÃO DE GIRO */
        .card.spinning {
            animation: spinCard 0.1s linear infinite;
            filter: blur(2px);
        }

        @keyframes spinCard {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(1deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(5px) rotate(-1deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .card.winning {
            animation: winPulse 1s ease infinite;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .card.crystal {
            border-color: #9333ea;
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.8);
            animation: crystalGlow 2s ease infinite;
        }

        @keyframes crystalGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(147, 51, 234, 0.8); }
            50% { box-shadow: 0 0 50px rgba(147, 51, 234, 1); }
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .card.spinning .card-icon {
            animation: iconShuffle 0.1s linear infinite;
        }

        @keyframes iconShuffle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .card-label {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card[data-type="light"] { border-color: #ffd700; }
        .card[data-type="light"] .card-icon { filter: drop-shadow(0 0 10px #ffd700); }
        
        .card[data-type="shadow"] { border-color: #9333ea; }
        .card[data-type="shadow"] .card-icon { filter: drop-shadow(0 0 10px #9333ea); }
        
        .card[data-type="chaos"] { border-color: #ef4444; }
        .card[data-type="chaos"] .card-icon { filter: drop-shadow(0 0 10px #ef4444); }
        
        .card[data-type="empathy"] { border-color: #22c55e; }
        .card[data-type="empathy"] .card-icon { filter: drop-shadow(0 0 10px #22c55e); }
        
        .card[data-type="balance"] { border-color: #3b82f6; }
        .card[data-type="balance"] .card-icon { filter: drop-shadow(0 0 10px #3b82f6); }
        
        .card[data-type="crystal"] { 
            border-color: #a855f7;
            background: linear-gradient(135deg, #2d1b4e, #1a0b2e);
        }

        /* Spin Button */
        .spin-container {
            text-align: center;
        }

        .spin-btn {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
            border: 3px solid #ffd700;
            color: white;
            padding: 20px 80px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.5);
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(147, 51, 234, 0.8);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: linear-gradient(135deg, #4a4a6a, #2d2d44);
        }

        .spin-btn.spinning {
            animation: buttonPulse 0.5s ease infinite;
        }

        @keyframes buttonPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .spin-cost {
            margin-top: 10px;
            color: #9333ea;
            font-size: 14px;
        }

        /* Result Message */
        .result-message {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-message.show {
            display: block;
        }

        .result-message.win {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
            border: 2px solid #22c55e;
            color: #22c55e;
        }

        .result-message.lose {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border: 2px solid #ef4444;
            color: #ef4444;
        }

        .result-message.crystal-win {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.3), rgba(147, 51, 234, 0.2));
            border: 2px solid #a855f7;
            color: #a855f7;
            font-size: 32px;
            animation: crystalWin 2s ease infinite;
        }

        @keyframes crystalWin {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Language Selector */
        .lang-selector {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            z-index: 100;
        }

        .lang-selector select {
            background: transparent;
            border: none;
            color: #ffd700;
            font-size: 16px;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffd700;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        .modal-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(135deg, #9333ea, #7c3aed);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(147, 51, 234, 0.5);
        }

        .modal-btn.cancel {
            background: linear-gradient(135deg, #4a4a6a, #2d2d44);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #ffd700;
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .slot-grid {
                gap: 10px;
            }
            
            .card-icon {
                font-size: 32px;
            }
            
            .header {
                padding: 10px 15px;
            }
            
            .logo {
                font-size: 20px;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #ffd700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            z-index: 100;
            transition: all 0.3s;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
        }

        /* Volume Control */
        .volume-control {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            display: none;
            z-index: 100;
        }

        .volume-control.show {
            display: block;
        }

        .volume-slider {
            width: 150px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">⚡ SOULHASH ARENA</div>
        <div class="header-right">
            <div class="balance-display" id="balanceDisplay" style="display: none;">
                <div class="balance-icon">S</div>
                <div>
                    <div style="font-size: 12px; color: #888;" data-i18n="balance">Saldo</div>
                    <div style="font-weight: bold;" id="balanceValue">0</div>
                </div>
            </div>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
        </div>
    </div>

    <!-- Menu Dropdown -->
    <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" onclick="showHashInfo()">
            <span>🔐</span>
            <span data-i18n="hashInfo">Info do Hash</span>
        </div>
        <div class="menu-item" onclick="toggleSound()">
            <span id="soundIcon">🔊</span>
            <span data-i18n="sound">Som</span>
        </div>
        <div class="menu-item" onclick="showWithdraw()">
            <span>💰</span>
            <span data-i18n="withdraw">Retirar</span>
        </div>
        <div class="menu-item" onclick="disconnectWallet()">
            <span>🚪</span>
            <span data-i18n="disconnect">Desconectar</span>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Connect Section -->
        <div class="connect-section" id="connectSection">
            <h1 style="margin-bottom: 20px; font-size: 42px;" data-i18n="welcome">Bem-vindo ao SoulHash Arena</h1>
            <p style="margin-bottom: 40px; color: #888; font-size: 18px;" data-i18n="connectWallet">Conecte sua wallet Phantom para começar</p>
            <button class="connect-btn" onclick="connectWallet()">
                <span data-i18n="connectPhantom">Conectar Phantom Wallet</span>
            </button>
        </div>

        <!-- Game Board -->
        <div class="game-board" id="gameBoard">
            <!-- Energy Bar -->
            <div class="energy-container">
                <div class="energy-label">
                    <span data-i18n="energy">Energia</span>
                    <span><span id="energyValue">100</span> / <span id="maxEnergyValue">100</span></span>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="energyFill" style="width: 100%;">
                        <span id="energyText">100%</span>
                    </div>
                </div>
            </div>

            <!-- Result Message -->
            <div class="result-message" id="resultMessage"></div>

            <!-- Slot Grid -->
            <div class="slot-container">
                <div class="slot-grid" id="slotGrid">
                    <!-- Cards will be generated here -->
                </div>

                <!-- Spin Button -->
                <div class="spin-container">
                    <button class="spin-btn" id="spinBtn" onclick="spin()">
                        <span data-i18n="spin">GIRAR</span>
                    </button>
                    <div class="spin-cost" data-i18n="spinCost">Custo: 10 energia</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-value" id="statSpins">0</div>
                    <div class="stat-label" data-i18n="spins">Giros</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statWins">0</div>
                    <div class="stat-label" data-i18n="wins">Vitórias</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statLevel">1</div>
                    <div class="stat-label" data-i18n="level">Nível</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Language Selector -->
    <div class="lang-selector">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="pt">🇵🇹 Português</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="zh">🇨 中文</option>
        </select>
    </div>

    <!-- Sound Toggle -->
    <div class="sound-toggle" id="soundToggle" onclick="toggleVolumeControl()">
        🔊
    </div>

    <!-- Volume Control -->
    <div class="volume-control" id="volumeControl">
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" onchange="setVolume(this.value)">
        <div style="text-align: center; font-size: 12px; margin-top: 5px;">Volume</div>
    </div>

    <!-- Hash Info Modal -->
    <div class="modal" id="hashModal">
        <div class="modal-content" style="position: relative;">
            <span class="close-modal" onclick="closeModal('hashModal')">&times;</span>
            <h2 class="modal-title" data-i18n="hashInfo">Info do Hash</h2>
            <div style="margin: 20px 0;">
                <div style="color: #888; margin-bottom: 5px;" data-i18n="yourHash">Seu Hash:</div>
                <div class="hash-info" id="modalHashValue">-</div>
            </div>
            <div style="margin: 20px 0;">
                <div style="color: #888; margin-bottom: 5px;" data-i18n="wallet">Wallet:</div>
                <div class="hash-info" id="modalWalletValue">-</div>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content" style="position: relative;">
            <span class="close-modal" onclick="closeModal('withdrawModal')">&times;</span>
            <h2 class="modal-title" data-i18n="withdraw">Retirar</h2>
            <div style="margin: 20px 0;">
                <div style="color: #888; margin-bottom: 5px;" data-i18n="availableBalance">Saldo disponível:</div>
                <div style="font-size: 24px; color: #ffd700; font-weight: bold;">
                    <span id="withdrawBalance">0</span> Hash
                </div>
            </div>
            <input type="number" class="modal-input" id="withdrawAmount" placeholder="Quantidade" min="20">
            <button class="modal-btn" onclick="withdraw()" data-i18n="confirmWithdraw">Confirmar Retirada</button>
            <button class="modal-btn cancel" onclick="closeModal('withdrawModal')" data-i18n="cancel">Cancelar</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO ====================
        const API_URL = 'https://soulhash-api.onrender.com';
        
        // ==================== ESTADO ====================
        let state = {
            wallet: null,
            soulhash: null,
            sessionToken: null,
            balance: 0,
            energy: 10,
            maxEnergy: 10,
            soundEnabled: true,
            volume: 0.5,
            language: 'pt',
            stats: { spins: 0, wins: 0, xp: 0 },
            isSpinning: false,
            backgroundMusic: null
        };

        // ==================== TRADUÇÕES ====================
        const translations = {
            pt: {

        // ==================== CARD CONFIG ====================
        const cardTypes = {
            light: { icon: '☀️', label: { pt: 'Luz', en: 'Light', es: 'Luz', ja: '光', zh: '光' } },
            shadow: { icon: '👤', label: { pt: 'Sombra', en: 'Shadow', es: 'Sombra', ja: '影', zh: '影' } },
            chaos: { icon: '💥', label: { pt: 'Caos', en: 'Chaos', es: 'Caos', ja: '混沌', zh: '混沌' } },

            balance: { icon: '⚖️', label: { pt: 'Equilíbrio', en: 'Balance', es: 'Equilibrio', ja: '均衡', zh: '平衡' } },

        // ==================== SISTEMA DE ÁUDIO AVANÇADO ====================
        class AudioManager {
            constructor() {
                this.ctx = null;
                this.volume = 0.5;
                this.backgroundMusic = null;
                this.isPlaying = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            // Música de fundo suspense (drone ambiental)
            playBackgroundMusic() {
                if (!this.ctx || this.isPlaying) return;
                this.isPlaying = true;

                const oscillator = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(55, this.ctx.currentTime); // A1 nota baixa
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, this.ctx.currentTime);

                gainNode.gain.setValueAtTime(this.volume * 0.1, this.ctx.currentTime);
                
                oscillator.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                
                oscillator.start();
                this.backgroundMusic = oscillator;

                // Modulação para criar atmosfera
                setInterval(() => {
                    if (this.backgroundMusic && this.ctx) {
                        oscillator.frequency.setValueAtTime(55 + Math.random() * 10, this.ctx.currentTime);
                    }
                }, 5000);
            }

            stopBackgroundMusic() {
                if (this.backgroundMusic) {
                    this.backgroundMusic.stop();
                    this.backgroundMusic = null;
                    this.isPlaying = false;
                }
            }

            // Som de giro (slot machine)
            playSpin() {
                if (!this.ctx || !state.soundEnabled) return;
                
                const duration = 0.1;
                const count = 10;
                
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        
                        osc.frequency.setValueAtTime(200 + Math.random() * 100, this.ctx.currentTime);
                        gain.gain.setValueAtTime(this.volume * 0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                        
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        
                        osc.start();
                        osc.stop(this.ctx.currentTime + duration);
                    }, i * 100);
                }
            }

            // Som de vitória (moedas)
            playWin() {
                if (!this.ctx || !state.soundEnabled) return;
                
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C major
                
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                        gain.gain.setValueAtTime(this.volume * 0.3, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.3);
                    }, i * 150);
                });
            }

            // Som de derrota
            playLose() {
                if (!this.ctx || !state.soundEnabled) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.5);
                
                gain.gain.setValueAtTime(this.volume * 0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            }

            // Som de cristal (especial)
            playCrystal() {
                if (!this.ctx || !state.soundEnabled) return;
                
                const notes = [523.25, 783.99, 1046.50, 1567.98, 2093.00];
                
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                        gain.gain.setValueAtTime(this.volume * 0.4, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.8);
                        
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.8);
                    }, i * 200);
                });
            }

            setVolume(vol) {
                this.volume = vol / 100;
            }
        }

        const audioManager = new AudioManager();

        // ==================== WALLET CONNECTION ====================
        async function connectWallet() {
            const t = translations[state.language];
            
            if (typeof window.solana === 'undefined') {
                alert('Por favor, instale a Phantom wallet!');
                return;
            }

            try {
                // Inicializar áudio
                audioManager.init();
                
                const response = await window.solana.connect();
                const wallet = response.publicKey.toString();
                
                state.wallet = wallet;
                
                const challengeRes = await fetch(`${API_URL}/challenge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet })
                });
                
                const challengeData = await challengeRes.json();
                
                const encodedMessage = new TextEncoder().encode(challengeData.message);
                const signedMessage = await window.solana.signMessage(encodedMessage, 'utf8');
                
                const verifyRes = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        wallet,
                        signature: bs58.encode(signedMessage.signature)
                    })
                });
                
                const verifyData = await verifyRes.json();
                
                state.soulhash = verifyData.soulhash;
                state.sessionToken = verifyData.sessionToken;
                state.balance = verifyData.balance;
                state.energy = verifyData.energy;
                state.maxEnergy = verifyData.maxEnergy;
                state.stats = verifyData.stats;
                
                updateUI();
                document.getElementById('connectSection').style.display = 'none';
                document.getElementById('gameBoard').classList.add('active');
                document.getElementById('balanceDisplay').style.display = 'flex';
                
                // Iniciar música de fundo
                setTimeout(() => {
                    audioManager.playBackgroundMusic();
                }, 1000);
                
                // Renderizar grid inicial
                renderInitialGrid();
                
                if (verifyData.isNew) {
                    showResult('🎁 Bônus de 100 Hash recebido!', 'win');
                    audioManager.playWin();
                }
                
            } catch (error) {
                console.error('Erro na conexão:', error);
                alert('Erro ao conectar wallet. Tente novamente.');
            }
        }

        function disconnectWallet() {
            if (window.solana) {
                window.solana.disconnect();
            }
            audioManager.stopBackgroundMusic();
            state = {
                wallet: null,
                soulhash: null,
                sessionToken: null,
                balance: 0,
                energy: 10,
                maxEnergy: 10,
                soundEnabled: true,
                volume: 0.5,
                language: 'pt',
                stats: { spins: 0, wins: 0, xp: 0 },
                isSpinning: false,
                backgroundMusic: null
            };
            document.getElementById('connectSection').style.display = 'block';
            document.getElementById('gameBoard').classList.remove('active');
            document.getElementById('balanceDisplay').style.display = 'none';
            toggleMenu();
        }

        // ==================== ANIMAÇÃO DE GIRO ====================
        function renderInitialGrid() {
            const gridElement = document.getElementById('slotGrid');
            gridElement.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-type', 'balance');
                card.innerHTML = `
                    <div class="card-icon">❓</div>
                    <div class="card-label">?</div>
                `;
                gridElement.appendChild(card);
            }
        }

        async function spin() {
            if (state.isSpinning) return;
            if (state.energy < 1) {
                showResult(translations[state.language].noEnergy, 'lose');
                audioManager.playLose();
                return;
            }

            state.isSpinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            spinBtn.classList.add('spinning');
            
            // Tocar som de giro
            audioManager.playSpin();
            
            // Adicionar animação de giro nas cartas
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => card.classList.add('spinning'));
            
            try {
                const response = await fetch(`${API_URL}/spin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-session-token': state.sessionToken
                    }
                });
                
                const data = await response.json();
                
                // Aguardar animação
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Remover animação
                cards.forEach(card => card.classList.remove('spinning'));
                
                // Atualizar estado
                state.balance = data.balance;
                state.energy = data.energy;
                state.stats = data.stats;
                
                // Renderizar grid final
                renderGrid(data.grid, data.winPositions, data.combo);
                
                // Mostrar resultado
                if (data.isCrystal) {
                    showResult(translations[state.language].crystalWin, 'crystal-win');
                    audioManager.playCrystal();
                } else if (data.isWin) {
                    showResult(`${translations[state.language].win} +${data.reward} Hash`, 'win');
                    audioManager.playWin();
                } else {
                    showResult(translations[state.language].lose, 'lose');
                    audioManager.playLose();
                }
                
                updateUI();
                
            } catch (error) {
                console.error('Erro no spin:', error);
                alert('Erro ao girar. Tente novamente.');
                cards.forEach(card => card.classList.remove('spinning'));
            } finally {
                state.isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.classList.remove('spinning');
            }
        }

        function renderGrid(grid, winPositions = [], combo) {
            const gridElement = document.getElementById('slotGrid');
            gridElement.innerHTML = '';
            
            grid.forEach((cardType, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-type', cardType);
                
                const isWinning = winPositions.includes(index);
                if (isWinning) {
                    card.classList.add('winning');
                }
                
                if (cardType === 'crystal') {
                    card.classList.add('crystal');
                }
                
                const cardData = cardTypes[cardType];
                const label = cardData.label[state.language] || cardData.label.en;
                
                card.innerHTML = `
                    <div class="card-icon">${cardData.icon}</div>
                    <div class="card-label">${label}</div>
                `;
                
                gridElement.appendChild(card);
            });
        }

        function showResult(message, type) {
            const resultEl = document.getElementById('resultMessage');
            resultEl.textContent = message;
            resultEl.className = `result-message show ${type}`;
            
            setTimeout(() => {
                resultEl.classList.remove('show');
            }, 3000);
        }

        function updateUI() {
            document.getElementById('balanceValue').textContent = state.balance;
            document.getElementById('energyValue').textContent = state.energy;
            document.getElementById('maxEnergyValue').textContent = state.maxEnergy;
            
            const energyPercent = (state.energy / state.maxEnergy) * 100;
            document.getElementById('energyFill').style.width = `${energyPercent}%`;
            document.getElementById('energyText').textContent = `${Math.round(energyPercent)}%`;
            
            document.getElementById('statSpins').textContent = state.stats.spins || 0;
            document.getElementById('statWins').textContent = state.stats.wins || 0;
            document.getElementById('statLevel').textContent = Math.floor((state.stats.xp || 0) / 1000) + 1;
        }

        // ==================== MENU & MODALS ====================
        function toggleMenu() {
            document.getElementById('menuDropdown').classList.toggle('active');
        }

        function showHashInfo() {
            document.getElementById('modalHashValue').textContent = state.soulhash || '-';
            document.getElementById('modalWalletValue').textContent = state.wallet ? 
                `${state.wallet.slice(0, 6)}...${state.wallet.slice(-4)}` : '-';
            document.getElementById('hashModal').classList.add('active');
            toggleMenu();
        }

        function showWithdraw() {
            document.getElementById('withdrawBalance').textContent = state.balance;
            document.getElementById('withdrawModal').classList.add('active');
            toggleMenu();
        }

        async function withdraw() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            
            if (!amount || amount < 20) {
                alert('Valor mínimo de saque é 20 Hash.');
                return;
            }
            
            if (amount > state.balance) {
                alert('Saldo insuficiente.');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/reward`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-session-token': state.sessionToken
                    },
                    body: JSON.stringify({ 
                        amount,
                        wallet: state.wallet 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    state.balance = data.remainingBalance;
                    updateUI();
                    closeModal('withdrawModal');
                    alert(`Saque de ${amount} Hash realizado com sucesso!\nTX: ${data.txSimulated}`);
                } else {
                    alert(data.error || 'Erro ao realizar saque.');
                }
                
            } catch (error) {
                console.error('Erro no withdraw:', error);
                alert('Erro ao realizar saque. Tente novamente.');
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            document.getElementById('soundToggle').textContent = state.soundEnabled ? '🔊' : '🔇';
            document.getElementById('soundIcon').textContent = state.soundEnabled ? '🔊' : '🔇';
            toggleMenu();
        }

        function toggleVolumeControl() {
            document.getElementById('volumeControl').classList.toggle('show');
        }

        function setVolume(value) {
            state.volume = value / 100;
            audioManager.setVolume(value);
        }

        // ==================== LANGUAGE ====================
        function changeLanguage(lang) {
            state.language = lang;
            updateTexts();
            const grid = document.getElementById('slotGrid');
            if (grid.children.length > 0 && !state.isSpinning) {
                Array.from(grid.children).forEach(card => {
                    const type = card.getAttribute('data-type');
                    if (cardTypes[type]) {
                        const label = cardTypes[type].label[lang] || cardTypes[type].label.en;
                        card.querySelector('.card-label').textContent = label;
                    }
                });
            }
        }

        function updateTexts() {
            const t = translations[state.language];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
        }

        // ==================== INICIALIZAÇÃO ====================
        window.addEventListener('load', () => {
            updateTexts();
        });

        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
            if (!e.target.closest('.sound-toggle') && !e.target.closest('.volume-control')) {
                document.getElementById('volumeControl').classList.remove('show');
            }
        });

        // Prevenir cold start
        setInterval(() => {
            fetch(`${API_URL}/health`).catch(() => {});
        }, 14 * 60 * 1000);
    </script>
