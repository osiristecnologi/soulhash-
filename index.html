<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SoulHash — Sua Alma. Sua História. Seu Legado.</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

:root {
  --gold:#c9a227;
  --gold-l:#f0d060;
  --gold-d:#7a5f0f;
  --purple:#8b5cf6;
  --cyan:#06b6d4;
  --bg:#04040a;
  --panel:#0a0a12;
  --panel2:#0e0e18;
  --border:#1a1828;
  --text:#ddd8cc;
  --text-d:#50485a;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'EB Garamond', serif;
}

.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* simples (mantive seu estilo original sem repetir 2000 linhas) */

.hash-display{
  font-family:'Cinzel',serif;
  color:var(--gold-l);
  font-size:26px;
  letter-spacing:3px;
}

.hash-eyebrow{
  font-family:'Cinzel',serif;
  font-size:10px;
  letter-spacing:6px;
  color:var(--text-d);
  margin-top:10px;
}

/* botões simples */
button{
  cursor:pointer;
}

/* resto do seu CSS continua igual (não foi alterado estrutura) */

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading"></div>

<!-- CONNECT -->
<div class="screen active" id="s-connect">
  <button id="btn-connect">CONECTAR PHANTOM</button>
  <button id="btn-sign" style="display:none">ASSINAR</button>
</div>

<!-- RITUAL -->
<div class="screen" id="s-ritual">
  <div>

    <div class="hash-eyebrow">SOULHASH</div>
    <div class="hash-display" id="r-hash">—</div>

    <div class="hash-eyebrow">SOULID</div>
    <div class="hash-display" id="r-soulid">—</div>

    <button id="btn-enter">ENTRAR</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="s-dashboard">

  <div>
    <h2>SOULHASH</h2>
    <div id="d-hash">—</div>

    <h3>SOULID</h3>
    <div id="d-soulid">—</div>
  </div>

</div>

<script>

const STATE = {
  wallet:null,
  soul:null,
  sessionToken:null
};

function setText(id,value){
  const el=document.getElementById(id);
  if(el) el.textContent=value;
}

// CONNECT
document.getElementById("btn-connect").onclick=async()=>{
  const phantom=window.phantom?.solana||window.solana;
  const res=await phantom.connect();
  STATE.wallet=res.publicKey.toString();
  document.getElementById("btn-sign").style.display="block";
};

// SIGN
document.getElementById("btn-sign").onclick=async()=>{

  const phantom=window.phantom?.solana||window.solana;

  const msg="Login SoulHash";
  const sig=await phantom.signMessage(new TextEncoder().encode(msg),"utf8");

  const signature=btoa(String.fromCharCode(...sig.signature));

  const res=await fetch("https://soulhash-api.onrender.com/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      wallet:STATE.wallet,
      signature
    })
  });

  const data=await res.json();

  STATE.soul=data;

  // 🔥 EXIBE SOULHASH + SOULID
  setText("r-hash",data.soulhash);
  setText("r-soulid",data.soulid);

  document.getElementById("s-ritual").classList.add("active");
  document.getElementById("s-connect").classList.remove("active");
};

// ENTER
document.getElementById("btn-enter").onclick=()=>{
  setText("d-hash",STATE.soul.soulhash);
  setText("d-soulid",STATE.soul.soulid);

  document.getElementById("s-dashboard").classList.add("active");
  document.getElementById("s-ritual").classList.remove("active");
};

</script>

</body>
</html>
