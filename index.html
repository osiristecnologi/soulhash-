<!DOCTYPE html>
<html>
<head>
<title>SoulHash</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at center, #0b0f1a, #05070d);
  color:#fff;
  font-family:Arial;
}

.container {
  display:flex;
  height:100vh;
}

/* LEFT */
.left {
  width:20%;
  padding:20px;
  border-right:1px solid #222;
}

.left h2 {
  color:gold;
}

/* CENTER */
.center {
  width:60%;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.circle {
  width:250px;
  height:250px;
  border-radius:50%;
  border:3px solid #00ccff;
  box-shadow:0 0 40px #00ccff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  margin-bottom:30px;
}

/* RIGHT */
.right {
  width:20%;
  padding:20px;
  border-left:1px solid #222;
}

.bar {
  height:8px;
  background:#222;
  margin-bottom:10px;
}

.fill {
  height:8px;
}

.light { width:35%; background:gold; }
.dark { width:25%; background:purple; }
.balance { width:40%; background:cyan; }

button {
  padding:10px;
  margin:5px;
  background:black;
  border:1px solid gold;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<h2>SOUL</h2>

<p id="wallet">Wallet: -</p>
<p id="balance">Balance: -</p>
<p id="soulhash">SoulHash: -</p>

<button onclick="connectWallet()">Connect Wallet</button>
</div>

<!-- CENTER -->
<div class="center">

<div class="circle">S</div>

<button onclick="pay('basic')">Basic 0.02</button>
<button onclick="pay('pro')">Pro 0.06</button>
<button onclick="pay('elite')">Elite 0.1</button>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Attributes</h3>

<p>Light</p>
<div class="bar"><div class="fill light"></div></div>

<p>Dark</p>
<div class="bar"><div class="fill dark"></div></div>

<p>Balance</p>
<div class="bar"><div class="fill balance"></div></div>

<p>SHASH: <span id="shash">0</span></p>

</div>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>
let userWallet = "";

const RECEIVER = "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm";

const prices = {
  basic: 0.02,
  pro: 0.06,
  elite: 0.1
};

async function connectWallet() {
  if (!window.solana || !window.solana.isPhantom) {
    alert("Open in Phantom");
    return;
  }

  const res = await window.solana.connect();
  userWallet = res.publicKey.toString();

  document.getElementById("wallet").innerText = "Wallet: " + userWallet;

  const connection = new solanaWeb3.Connection(
    solanaWeb3.clusterApiUrl("mainnet-beta")
  );

  const balance = await connection.getBalance(
    new solanaWeb3.PublicKey(userWallet)
  );

  document.getElementById("balance").innerText =
    "Balance: " + (balance / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4) + " SOL";

  const response = await fetch("https://soulhash-api.onrender.com/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ wallet: userWallet })
  });

  const data = await response.json();
  document.getElementById("soulhash").innerText = "SoulHash: " + data.soulhash;
}

async function pay(type) {
  const connection = new solanaWeb3.Connection(
    solanaWeb3.clusterApiUrl("mainnet-beta"),
    "confirmed"
  );

  const transaction = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: new solanaWeb3.PublicKey(userWallet),
      toPubkey: new solanaWeb3.PublicKey(RECEIVER),
      lamports: prices[type] * solanaWeb3.LAMPORTS_PER_SOL
    })
  );

  transaction.feePayer = new solanaWeb3.PublicKey(userWallet);

  const { blockhash } = await connection.getLatestBlockhash();
  transaction.recentBlockhash = blockhash;

  const result = await window.solana.signAndSendTransaction(transaction);
  await connection.confirmTransaction(result.signature);

  let reward = type === "basic" ? 10 : type === "pro" ? 50 : 100;
  document.getElementById("shash").innerText =
    parseInt(document.getElementById("shash").innerText) + reward;

  alert("Payment success");
}
</script>

</body>
</html>
