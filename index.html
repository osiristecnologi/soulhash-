<!DOCTYPE html>
<html>
<head>
<title>SoulHash</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body {
  margin:0;
  background: radial-gradient(circle at center, #0b0f1a, #05070d);
  color:#fff;
  font-family:Arial;
}

.container {
  display:flex;
  height:100vh;
}

.left {
  width:20%;
  padding:20px;
  border-right:1px solid #222;
}

.center {
  width:60%;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.circle {
  width:250px;
  height:250px;
  border-radius:50%;
  border:3px solid #00ccff;
  box-shadow:0 0 40px #00ccff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  margin-bottom:30px;
}

.right {
  width:20%;
  padding:20px;
  border-left:1px solid #222;
}

.bar { height:8px; background:#222; margin-bottom:10px; }
.fill { height:8px; }

.light { width:35%; background:gold; }
.dark { width:25%; background:purple; }
.balance { width:40%; background:cyan; }

button {
  padding:10px;
  margin:5px;
  background:black;
  border:1px solid gold;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h2>SOUL</h2>
<p id="wallet">Wallet: -</p>
<p id="balance">Balance: -</p>
<p id="soulhash">SoulHash: -</p>

<button onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="center">
<div class="circle">S</div>

<button onclick="pay(0.02)">Basic 0.02 SOL</button>
<button onclick="pay(0.06)">Pro 0.06 SOL</button>
<button onclick="pay(0.1)">Elite 0.1 SOL</button>
</div>

<div class="right">
<h3>Attributes</h3>

<p>Light</p>
<div class="bar"><div class="fill light"></div></div>

<p>Dark</p>
<div class="bar"><div class="fill dark"></div></div>

<p>Balance</p>
<div class="bar"><div class="fill balance"></div></div>

<p>SHASH: <span id="shash">0</span></p>
</div>

</div>

<script>

// ===== CONFIG =====
let userWallet = "";
const RECEIVER = "AbrrjK6s9ScxZzVGYw34MvvjK39utg558j7WFwtP4rcm";

// ===== HASH =====
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function formatHash(hex) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
  let result = '';
  for (let i = 0; i < 12; i++) {
    result += chars[parseInt(hex.slice(i*2,i*2+2),16) % chars.length];
  }
  return result;
}

// ===== CONNECT =====
async function connectWallet() {
  if (!window.solana || !window.solana.isPhantom) {
    alert("Abra dentro da Phantom Wallet");
    return;
  }

  const res = await window.solana.connect();
  userWallet = res.publicKey.toString();

  document.getElementById("wallet").innerText = "Wallet: " + userWallet;

  const connection = new solanaWeb3.Connection(
    solanaWeb3.clusterApiUrl("mainnet-beta")
  );

  const balance = await connection.getBalance(
    new solanaWeb3.PublicKey(userWallet)
  );

  document.getElementById("balance").innerText =
    "Balance: " + (balance / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4) + " SOL";
}

// ===== PAGAMENTO =====
async function pay(amount) {

  if (!userWallet) {
    await connectWallet();
    if (!userWallet) return;
  }

  const connection = new solanaWeb3.Connection(
    solanaWeb3.clusterApiUrl("mainnet-beta"),
    "confirmed"
  );

  const transaction = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: new solanaWeb3.PublicKey(userWallet),
      toPubkey: new solanaWeb3.PublicKey(RECEIVER),
      lamports: amount * solanaWeb3.LAMPORTS_PER_SOL
    })
  );

  transaction.feePayer = new solanaWeb3.PublicKey(userWallet);

  const { blockhash } = await connection.getLatestBlockhash();
  transaction.recentBlockhash = blockhash;

  try {
    const result = await window.solana.signAndSendTransaction(transaction);
    await connection.confirmTransaction(result.signature);

    // ===== GERA HASH =====
    const hex = await sha256(userWallet + result.signature);
    const hash = formatHash(hex);

    document.getElementById("soulhash").innerText = "SoulHash: " + hash;

    // ===== ENVIA BACKEND =====
    fetch("https://soulhash-api.onrender.com/payment", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        wallet: userWallet,
        hash: hash,
        tx: result.signature
      })
    });

    // ===== RECOMPENSA =====
    let reward = amount === 0.02 ? 10 : amount === 0.06 ? 50 : 100;

    document.getElementById("shash").innerText =
      parseInt(document.getElementById("shash").innerText) + reward;

    alert("Pagamento confirmado 🔥");

  } catch (err) {
    console.error(err);
    alert("Erro no pagamento ❌");
  }
}

</script>

</body>
</html>
